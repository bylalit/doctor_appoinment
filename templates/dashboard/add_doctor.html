{% extends "dashboard/layout.html" %}
{% load static %}
{% block contant %}

    <section class="ps-5 bg-light pt-4 w-100 mb-5">

        <!-- 🔷 Title -->
        <div class="mb-4" data-aos="fade-right">
            <h3 class="fw-bold" style="color:#5f6fff;">Add Doctor</h3>
            <p class="text-muted small">Fill all details carefully</p>
        </div>

        <!-- 🔷 Card Form -->
        <div class="bg-white rounded-4 shadow-sm p-4"
            style="max-width:900px; border-top:4px solid #5f6fff;"
            data-aos="fade-up">

            <form method='POST' enctype="multipart/form-data">
                {% csrf_token %}

                <!-- 📸 Image Upload -->
                <div class="mb-4 text-center">
                    <label class="form-label fw-semibold text-primary">Doctor Image</label>

                    <div class="d-flex flex-column align-items-center">

                        <img id="previewImage"
                            src="{% static 'assets/assets_frontend/profile.png' %}"
                            class="rounded-circle mb-3 shadow-sm"
                            style="width:110px;height:110px;object-fit:cover;border:4px solid #e9ecff;">

                        <input type="file" name="image" id="image"
                            class="form-control w-50"
                            accept="image/*"
                            onchange="previewImage(event)">
                    </div>
                </div>

                <!-- 🔹 Row 1 -->
                <div class="row mb-3">
                    <div class="col-md-6" data-aos="fade-right">
                        <label class="form-label fw-semibold">Doctor Name</label>
                        <input type="text" name="name" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Enter name">
                    </div>

                    <div class="col-md-6" data-aos="fade-left">
                        <label class="form-label fw-semibold">Speciality</label>
                        <select name="category" class="form-select" style="border-radius:10px;">
                            {% for cat in category %}
                                <option value="{{ cat.id }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- 🔹 Row 2 -->
                <div class="row mb-3">
                    <div class="col-md-6" data-aos="fade-right">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Email">
                    </div>

                    <div class="col-md-6" data-aos="fade-left">
                        <label class="form-label fw-semibold">Degree</label>
                        <input type="text" name="degree" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Degree">
                    </div>
                </div>

                <!-- 🔹 Row 3 -->
                <div class="row mb-3">
                    <div class="col-md-6" data-aos="fade-right">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Username">
                    </div>

                    <div class="col-md-6" data-aos="fade-left">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Password">
                    </div>
                </div>

                <!-- 🔹 Row 4 -->
                <div class="row mb-3">
                    <div class="col-md-6" data-aos="fade-right">
                        <label class="form-label fw-semibold">Address</label>
                        <input type="text" name="address" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Address">
                    </div>

                    <div class="col-md-6" data-aos="fade-left">
                        <label class="form-label fw-semibold">Fees</label>
                        <input type="number" name="fees" class="form-control"
                            style="border-radius:10px;"
                            placeholder="Fees">
                    </div>
                </div>

                <!-- 🔹 Experience -->
                <div class="mb-3" data-aos="fade-up">
                    <label class="form-label fw-semibold">Experience</label>
                    <select name="experience" class="form-select" style="border-radius:10px;">
                        {% for i in "12345678910"|make_list %}
                            <option value="{{ i }}">{{ i }} Year</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 🔹 About -->
                <div class="mb-4" data-aos="fade-up">
                    <label class="form-label fw-semibold">About Doctor</label>
                    <textarea name="about" class="form-control"
                        style="border-radius:10px;"
                        rows="4" placeholder="Write about doctor..."></textarea>
                </div>

                <!-- 🔘 Submit -->
                <div class="text-center mt-3">
                    <button type="submit"
                        class="btn text-white px-5 py-2 rounded-pill fw-semibold"
                        style="background: linear-gradient(135deg,#5f6fff,#7b8bff); border:none; transition:0.3s;"
                        onmouseover="this.style.transform='scale(1.05)'"
                        onmouseout="this.style.transform=''">
                        Add Doctor
                    </button>
                </div>

            </form>
        </div>

    </section>

{% endblock %}
