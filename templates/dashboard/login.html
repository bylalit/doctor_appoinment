<html lang="en">
{% load static %}
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>Prescripto | Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            /* Modern Gradient Background */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Floating Background Shapes for Animation */
        .shape {
            position: absolute;
            z-index: -1;
            filter: blur(50px);
            border-radius: 50%;
            animation: move 10s infinite alternate;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(95, 111, 255, 0.2); top: -50px; left: -50px; }
        .shape-2 { width: 250px; height: 250px; background: rgba(28, 200, 138, 0.2); bottom: -50px; right: -50px; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 45px;
            width: 100%;
            max-width: 450px;
            animation: fadeInScale 0.8s ease-out;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(95, 111, 255, 0.15);
            border-color: rgb(95, 111, 255);
        }

        .btn-login {
            background: rgb(95, 111, 255);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background: #4a59e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(95, 111, 255, 0.3);
        }

        /* Alert Styling */
        .alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            animation: slideInRight 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .progress-bar span {
            animation: shrink 4s linear forwards;
        }
    </style>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert-box bg-white shadow-lg p-3 rounded-3 border-start border-4 {% if 'success' in message.tags %}border-success{% else %}border-danger{% endif %}" id="alertBox">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        {% if 'success' in message.tags %}
                            <i class="fas fa-check-circle text-success"></i>
                        {% else %}
                            <i class="fas fa-exclamation-circle text-danger"></i>
                        {% endif %}
                        <span class="small fw-medium">{{ message }}</span>
                    </div>
                    <i class="fas fa-times text-muted cursor-pointer ps-3" onclick="closeAlert()" style="cursor:pointer"></i>
                </div>
                <div class="progress mt-2" style="height: 3px;">
                    <div class="progress-bar {% if 'success' in message.tags %}bg-success{% else %}bg-danger{% endif %}" style="width: 100%"></div>
                </div>
            </div>
        {% endfor %}
    {% endif %}

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="{% static 'assets/assets_frontend/logo.svg' %}" alt="Logo" class="mb-3" style="width: 140px;">
                <h3 class="fw-bold text-dark">Admin <span style="color: rgb(95, 111, 255);">Login</span></h3>
                <p class="text-muted small">Please enter your credentials to continue</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted small fw-medium">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" class="form-control border-start-0" name="username" placeholder="Enter username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-medium">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" class="form-control border-start-0" name="password" placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login text-white w-100 mb-3">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        // Auto-close alert
        window.onload = function() {
            setTimeout(() => {
                let alert = document.getElementById("alertBox");
                if(alert) alert.style.display = "none";
            }, 4000);
        }

        function closeAlert() {
            let alert = document.getElementById("alertBox");
            if(alert) alert.style.display = "none";
        }
    </script>
</body>
</html>
