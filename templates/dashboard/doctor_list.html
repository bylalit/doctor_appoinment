{% extends "dashboard/layout.html" %}
{% load static %}
{% block contant %}


    <section class='w-100 p-5 bg-light'>
        <h3 class='mb-4 fs-4 ms-4'>All Doctors</h3>

        <div class="row row-cols-2 row-cols-sm-5 g-4 px-4">

            {% for doctor in doctors %}
            <div class="col">

                <div class="card border-0 rounded shadow-sm h-100"
                    style="transition:0.3s;"
                    onmouseover="this.style.transform='translateY(-8px)'"
                    onmouseout="this.style.transform='translateY(0)'">

                    <!-- 🔹 Image Container -->
                    <div class="bg-light d-flex justify-content-center align-items-center overflow-hidden"
                        style="height: 200px;">

                        <img src="{{ doctor.image.url }}" 
                            alt="Doctor"
                            class="img-fluid"
                            style="width: 100%; height: 100%; object-fit: cover;">
                    </div>

                    <!-- 🔹 Content -->
                    <div class="card-body pb-3 text-center">

                        <h6 class="card-title fw-bold mb-1">
                            {{ doctor.name }}
                        </h6>

                        <p class="text-muted small mb-2">
                            {{ doctor.category }}
                        </p>
                        

                        <form method="POST" action="{% url 'toggle_doctor' doctor.id %}">
                            {% csrf_token %}
                            
                            <div class='d-flex align-items-center justify-content-center'>
                                <input type="checkbox"
                                    name="available"
                                    onchange="this.form.submit()"
                                    {% if doctor.available %}checked{% endif %}>
                                    
                                <p class="small fw-bold m-0 ms-1">Available</p>
                            </div>
                        </form>

                        <div class="d-flex gap-2 mt-2 justify-content-center">

                            <!-- Edit Button -->
                            <a href="{% url 'doctor_edit' doctor.id %}" 
                            class="btn btn-sm btn-outline-primary"
                            style="transition:0.3s;"
                            onmouseover="this.style.backgroundColor='#0d6efd'; this.style.color='white';"
                            onmouseout="this.style.backgroundColor=''; this.style.color='';">
                                ✏️ Edit
                            </a>

                            <!-- Delete Button -->
                            <a href="{% url 'doctor_delete' doctor.id %}" 
                            class="btn btn-sm btn-outline-danger"
                            style="transition:0.3s;"
                            onclick="return confirm('Are you sure?')"
                            onmouseover="this.style.backgroundColor='#dc3545'; this.style.color='white';"
                            onmouseout="this.style.backgroundColor=''; this.style.color='';">
                                🗑 Delete
                            </a>

                        </div>

                    </div>

                </div>

            </div>
            {% endfor %}

        </div>
    </section>


{% endblock %}
