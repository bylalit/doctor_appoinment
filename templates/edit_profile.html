{% extends "layout.html" %}
{% load static %}

{% block contant %}

{% comment %} <style>
    /* Page animation */
    .profile-card {
        animation: fadeSlide 0.6s ease-in-out;
    }

    @keyframes fadeSlide {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Image hover effect */
    .profile-img {
        transition: transform 0.3s ease;
    }

    .profile-img:hover {
        transform: scale(1.05);
    }

    /* Input focus animation */
    .form-control:focus {
        box-shadow: 0 0 8px rgba(95, 111, 255, 0.4);
        border-color: rgb(95, 111, 255);
    }
</style> {% endcomment %}

<section class="my-5">
    <div class="container">

        <div class="profile-card bg-white shadow rounded p-4 mx-auto" style="max-width: 600px;">

            <h3 class="text-center mb-4 fw-semibold">Edit Profile</h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="text-center mb-4">
                    {% if patient.profile_image %}
                        <img src="{{ patient.profile_image.url }}" 
                             class="rounded-circle profile-img"
                             style="width:120px; height:120px; object-fit:cover; border:4px solid rgb(95,111,255);">
                    {% else %}
                        <img src="{% static 'assets/assets_frontend/profile.png' %}" 
                             class="rounded-circle profile-img"
                             style="width:120px; height:120px; object-fit:cover; border:4px solid rgb(95,111,255);">
                    {% endif %}
                </div>

                <div class="row">

                    <!-- Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted">Full Name</label>
                        <input type="text" name="username" class="form-control" value="{{ patient.username }}">
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ patient.email }}">
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ patient.phone }}">
                    </div>

                    <!-- City -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted">City</label>
                        <input type="text" name="city" class="form-control" value="{{ patient.city }}">
                    </div>

                    <!-- Image -->
                    <div class="col-12 mb-3">
                        <label class="form-label small text-muted">Change Profile Image</label>
                        <input type="file" name="image" class="form-control">
                    </div>

                    <!-- Address -->
                    <div class="col-12 mb-3">
                        <label class="form-label small text-muted">Address</label>
                        <textarea name="address" class="form-control" rows="3">{{ patient.address }}</textarea>
                    </div>

                </div>

                <!-- Buttons -->
                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url "my_profile" %}" class="btn btn-outline-secondary btn-sm px-4">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-sm text-white px-4"
                            style="background-color: rgb(95,111,255);">
                        Update Profile
                    </button>
                </div>

            </form>

        </div>
    </div>
</section>

{% endblock %}
