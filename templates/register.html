{% extends "layout.html" %}
{% load static %}

{% block contant %}
<section class="min-vh-100 d-flex align-items-center justify-content-center py-5" 
         style="background-color: #f4f7fe;">
    
    <div class="container">
        <div class="mx-auto bg-white shadow-lg border-0" 
             style="max-width: 650px; border-radius: 25px; overflow: hidden;">
            
            <div style="height: 10px; background: linear-gradient(90deg, #5f6fff, #9ca6ff);"></div>

            <div class="p-4 p-md-5">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">Join <span style="color: #5f6fff;">Prescripto</span></h2>
                    <p class="text-muted small">Create your patient account in just a few steps</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row g-4">
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted ms-2">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-user text-muted small"></i>
                                </span>
                                <input type="text" class="form-control border-0 bg-light p-3" 
                                       style="border-radius: 0 12px 12px 0; font-size: 14px;" 
                                       name="username" placeholder="Enter your full name" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted ms-2">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-envelope text-muted small"></i>
                                </span>
                                <input type="email" class="form-control border-0 bg-light p-3" 
                                       style="border-radius: 0 12px 12px 0; font-size: 14px;" 
                                       name="email" placeholder="name@example.com" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted ms-2">Password</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-lock text-muted small"></i>
                                </span>
                                <input type="password" class="form-control border-0 bg-light p-3" 
                                       style="border-radius: 0 12px 12px 0; font-size: 14px;" 
                                       name="password" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted ms-2">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-phone text-muted small"></i>
                                </span>
                                <input type="text" class="form-control border-0 bg-light p-3" 
                                       style="border-radius: 0 12px 12px 0; font-size: 14px;" 
                                       name="phone" placeholder="+91 00000 00000" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted ms-2">City</label>
                            <div class="input-group">
                                <span class="input-group-text border-0 bg-light" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-city text-muted small"></i>
                                </span>
                                <input type="text" class="form-control border-0 bg-light p-3" 
                                       style="border-radius: 0 12px 12px 0; font-size: 14px;" 
                                       name="city" placeholder="Ahmedabad" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted ms-2">Profile Picture</label>
                            <div class="p-3 border-2 border-dashed rounded-4 text-center" 
                                 style="border: 2px dashed #dee2e6; background-color: #fafbff;">
                                <input type="file" class="form-control form-control-sm border-0 bg-transparent" 
                                       name="image" accept="image/*">
                                <p class="text-muted mb-0 mt-2" style="font-size: 11px;">PNG, JPG up to 5MB</p>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted ms-2">Complete Address</label>
                            <textarea class="form-control border-0 bg-light p-3" 
                                      style="border-radius: 15px; font-size: 14px;" 
                                      name="address" rows="3" placeholder="Enter your full address..." required></textarea>
                        </div>
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn w-100 py-3 fw-bold text-white shadow-sm" 
                                style="background: #5f6fff; border-radius: 12px; border: none; transition: 0.4s;"
                                onmouseover="this.style.backgroundColor='#4a59e0'; this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 20px rgba(95,111,255,0.2)'"
                                onmouseout="this.style.backgroundColor='#5f6fff'; this.style.transform='translateY(0px)'; this.style.boxShadow='none'">
                            Sign Up Now
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <span class="text-muted small">Already part of our clinic? </span>
                        <a href="{% url 'login' %}" class="fw-bold text-decoration-none" style="color: #5f6fff;">Log In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
